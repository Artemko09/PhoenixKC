name: SonarCloud - Frontend (Angular)

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'src/PhoenixKC.UI'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'src/PhoenixKC.UI'

jobs:
  sonar-frontend:
    name: Analyze Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: src/PhoenixKC.UI
          args: >
            -Dsonar.projectKey=Artemko09_PhoenixKC
            -Dsonar.organization=artemko09
