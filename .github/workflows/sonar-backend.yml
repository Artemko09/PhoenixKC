name: SonarCloud - Backend (.NET)

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'src/**'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'src/**'

jobs:
  sonar-backend:
    name: Build and Analyze Backend
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: 'zulu'

      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'

      - name: Install SonarCloud scanner
        run: |
          dotnet tool install --global dotnet-sonarscanner

      - name: Build, Analize, Testing
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet-sonarscanner begin /k:"Artemko09_PhoenixKC" /o:"artemko09" /d:sonar.token="$SONAR_TOKEN" /d:sonar.host.url="https://sonarcloud.io"
          dotnet restore src/PhoenixKC.slnx
          dotnet build src/PhoenixKC.slnx --configuration Debug --no-restore
          dotnet test src/PhoenixKC.slnx --configuration Debug --no-build --verbosity normal
          dotnet-sonarscanner end /d:sonar.token="$SONAR_TOKEN"